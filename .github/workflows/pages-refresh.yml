name: Pages refresh

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Request a Pages build from the current source
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
